        { id: 'p-i-1', title: '台電受電室安檢完成', time: '7~14工作天', desc: '前期準備與安檢。' },
        { id: 'p-i-2', title: '台灣電力公司受理', time: '7~14工作天', desc: '設計、勘查、估算工料費。受理費1顆錶/500元。' },
        { id: 'p-i-3', title: '繳費通知及完成繳費', time: '-', desc: '繳交管路工程費(含電錶費)。' },
        { id: 'p-i-4', title: '申請聯合挖路許可', time: '30工作天', desc: '包含台電、自來水、瓦斯、中華電信。此階段需確認：1.變電所地坪完成 2.電力水孔完成 3.電錶箱體安裝完成 4.拆架完成(拆架前一個月掛件)。' },
        { id: 'p-i-5', title: '許可挖路施工報竣工', time: '14~45工作天', desc: '執行挖路工程。' },
        { id: 'p-i-6', title: '變壓器及外線安裝拉線', time: '14~21工作天', desc: '包含安排停電作業。' },
        { id: 'p-i-7', title: '設備及外線報竣工檢查', time: '7~21工作天', desc: '由台電進行最終檢查。' },
        { id: 'p-i-8', title: '送電掛錶', time: '7~14工作天', desc: '正式供電。' }
      ]
    };

    const FIVE_PIPELINES = [
      { name: '台電', flow: '掛件 → 安檢 → 設計 → 核費 → 繳費 → 請路證 → 外線施工(建築路損施工前)' },
      { name: '自來水', flow: '申請 → 設計 → 計費 → 繳費 → 請路證 → 外線施工 (第一段送水若於一樓板已完工,本階段只付繳費證明加切結書即可)' },
      { name: '電信', flow: '掛件 → 安檢 → 設計 → 請路證 → 外線施工(建築路損施工前)' },
      { name: '瓦斯', flow: '申請 → 設計 → 計費 → 簽呈 → 繳費 → 請路證 → 外線施工。(建築路損施工前) (不申請瓦斯個案附切結書即可)' },
      { name: '下水道', flow: '套圖 → 申請 → 設計 → 請路證 → 外線施工。(位於專用下水道完工地區) (不接管個案則開具衛工處免挖路證明，需屋頂板查驗完成始可辦理)' }
    ];

    // --- 主系統元件 ---
    function App() {
      const [activeTab, setActiveTab] = useState('documents');
      
      // 改為使用物件儲存各個地號的專屬進度
      const [lotProgress, setLotProgress] = useState({}); // 格式: { '地號A': { 'id1': true }, '地號B': ... }
      const [lotDates, setLotDates] = useState({}); // 格式: { '地號A': { 'id1': { estStart: '', estEnd: '', actStart: '', actEnd: '' } } }
      
      // 專案地號狀態
      const [lotNumbers, setLotNumbers] = useState([]);
      const [newLotInput, setNewLotInput] = useState('');
      const [activeLot, setActiveLot] = useState(null); // 目前選中的地號
      
      // 編輯地號狀態
      const [editingLotIndex, setEditingLotIndex] = useState(null);
      const [editingLotValue, setEditingLotValue] = useState('');

      // 編輯模式與認證狀態
      const [isEditMode, setIsEditMode] = useState(false);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [authError, setAuthError] = useState('');
      
      // 提示訊息狀態
      const [toastMessage, setToastMessage] = useState('');

      // 目前時間狀態
      const [currentTime, setCurrentTime] = useState(new Date());

      // 每秒更新時間
      useEffect(() => {
        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      // 初始化：載入本地暫存數據
      useEffect(() => {
        const savedData = localStorage.getItem('lianYueAppProgress');
        if (savedData) {
          try {
            const { lotNumbers: savedLots, lotProgress: savedProgress, lotDates: savedDates } = JSON.parse(savedData);
            if (savedLots && savedLots.length > 0) {
              setLotNumbers(savedLots);
              setActiveLot(savedLots[0]); // 預設選取第一個
            }
            if (savedProgress) {
              setLotProgress(savedProgress);
            }
            if (savedDates) {
              setLotDates(savedDates);
            }
          } catch (error) {
            console.error("無法解析本地暫存資料", error);
          }
        }
      }, []);

      // 顯示提示訊息
      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3000);
      };

      // 儲存數據(暫存)
      const handleSaveData = () => {
        localStorage.setItem('lianYueAppProgress', JSON.stringify({ lotNumbers, lotProgress, lotDates }));
        showToast('數據已暫存至您的瀏覽器！');
      };

      // 導出檔案 (改為導出包含完整網頁結構與資料的獨立檔案)
      const handleExportFile = () => {
        const backupData = JSON.stringify({ lotNumbers, lotProgress, lotDates });
        
        // 拷貝當前網頁的 HTML 結構
        const htmlClone = document.documentElement.cloneNode(true);
        
        // 清空 React 渲染區塊，避免產生的檔案打開時出現重複的 UI 元素
        const rootDiv = htmlClone.querySelector('#root');
        if (rootDiv) rootDiv.innerHTML = '';
        
        // 建立一段自動寫入資料的 Script，插入到 <head> 之中
        let dataScript = htmlClone.querySelector('#backup-data-script');
        if (!dataScript) {
          dataScript = document.createElement('script');
          dataScript.id = 'backup-data-script';
          htmlClone.querySelector('head').appendChild(dataScript);
        }
        
        // 將資料安全地嵌入腳本中，網頁打開時會自動寫入 localStorage
        const safeDataString = JSON.stringify(backupData).replace(/<\/script>/gi, '<\\/script>');
        dataScript.textContent = `
          try {
            const data = ${safeDataString};
            localStorage.setItem('lianYueAppProgress', data);
          } catch(e) { 
            console.error('還原備份資料失敗', e); 
          }
        `;
        
        // 轉換回 HTML 字串並加入 DOCTYPE
        const finalHtml = '<!DOCTYPE html>\n' + htmlClone.outerHTML;
        
        const blob = new Blob([finalHtml], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const dateStr = new Date().toISOString().split('T')[0];
        a.download = `聯悦建設_進度備份_${dateStr}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast('完整網頁檔案已成功導出！');
      };

      // 切換完成狀態 (針對目前選取的 activeLot 進行修改)
      const toggleItem = (id) => {
        if (!isEditMode || !activeLot) return; // 鎖定狀態或無地號時不允許切換
        
        setLotProgress(prev => ({
          ...prev,
          [activeLot]: {
            ...(prev[activeLot] || {}),
            [id]: !(prev[activeLot]?.[id])
          }
        }));
      };

      // 新增地號
      const handleAddLot = () => {
        const lotName = newLotInput.trim();
        if (lotName !== '' && !lotNumbers.includes(lotName)) {
          const newLots = [...lotNumbers, lotName];
          setLotNumbers(newLots);
          
          // 如果是第一次新增地號，預設選中它
          if (!activeLot) {
            setActiveLot(lotName);
          }
          setNewLotInput('');
        } else if (lotNumbers.includes(lotName)) {
          showToast('此地號名稱已存在！');
        }
      };

      // 啟動編輯地號
      const startEditingLot = (e, idx, lotName) => {
        e.stopPropagation();
        setEditingLotIndex(idx);
        setEditingLotValue(lotName);
      };

      // 儲存編輯後的地號名稱
      const saveEditedLot = (idx) => {
        if (editingLotIndex !== idx) return; // 防呆機制
        
        const oldName = lotNumbers[idx];
        const newName = editingLotValue.trim();

        if (newName === '' || newName === oldName) {
          setEditingLotIndex(null);
          return;
        }

        if (lotNumbers.includes(newName)) {
          showToast('此地號名稱已存在！');
          setEditingLotIndex(null);
          return;
        }

        // 更新地號陣列
        const newLots = [...lotNumbers];
        newLots[idx] = newName;
        setLotNumbers(newLots);

        // 無縫轉移該地號的進度紀錄
        setLotProgress(prev => {
          const newData = { ...prev };
          if (newData[oldName]) {
            newData[newName] = newData[oldName];
            delete newData[oldName];
          }
          return newData;
        });

        // 無縫轉移該地號的日期紀錄
        setLotDates(prev => {
          const newData = { ...prev };
          if (newData[oldName]) {
            newData[newName] = newData[oldName];
            delete newData[oldName];
          }
          return newData;
        });

        // 如果被修改的地號是當前選取的地號，更新選取狀態
        if (activeLot === oldName) {
          setActiveLot(newName);
        }

        setEditingLotIndex(null);
        showToast('地號名稱已更新！');
      };

      // 移除地號
      const handleRemoveLot = (e, indexToRemove) => {
        e.stopPropagation(); // 避免觸發選取地號事件
        const lotToRemove = lotNumbers[indexToRemove];
        const newLots = lotNumbers.filter((_, index) => index !== indexToRemove);
        setLotNumbers(newLots);

        // 清除該地號的進度紀錄 (確保資料乾淨)
        const newProgress = { ...lotProgress };
        delete newProgress[lotToRemove];
        setLotProgress(newProgress);
        
        const newDates = { ...lotDates };
        delete newDates[lotToRemove];
        setLotDates(newDates);

        // 如果刪除的是目前選中的地號，重新指向其他地號或清空
        if (activeLot === lotToRemove) {
          setActiveLot(newLots.length > 0 ? newLots[0] : null);
        }
      };

      // 驗證密碼
      const handleVerifyPassword = () => {
        if (passwordInput === '123456') {
          setIsEditMode(true);
          setShowAuthModal(false);
          setPasswordInput('');
          setAuthError('');
        } else {
          setAuthError('密碼錯誤，請重新輸入');
        }
      };

      // 計算目前地號的進度
      const calculateProgress = (flowArray) => {
        if (!activeLot) return 0;
        const currentLotProgress = lotProgress[activeLot] || {};
        const total = flowArray.length;
        const completed = flowArray.filter(step => currentLotProgress[step.id]).length;
        return Math.round((completed / total) * 100) || 0;
      };

      // 處理日期變更 (加入自動計算預計完成日期與連動輸入邏輯)
      const handleDateChange = (step, field, value) => {
        if (!isEditMode || !activeLot) return;
        setLotDates(prev => {
          const currentLotDates = prev[activeLot] || {};
          const newLotDates = { ...currentLotDates };
          
          // 目前被修改項目的新日期狀態
          const currentStepDates = { ...(newLotDates[step.id] || {}) };
          currentStepDates[field] = value;
          
          // 1. 如果修改的是預計開始日期，自動計算自己的預計完成日期
          if (field === 'estStart') {
            if (value) {
              const maxDays = getMaxDays(step.time);
              if (maxDays > 0) {
                currentStepDates.estEnd = addWorkingDays(value, maxDays);
              } else {
                currentStepDates.estEnd = value; // 如果沒有天數（例如時間為「-」），預計完成自動等於開始日期
              }
            } else {
              currentStepDates.estEnd = ''; // 清空時同步清空預計完成
            }
          }
          
          newLotDates[step.id] = currentStepDates;

          // 2. === 連動更新邏輯 (往下擴散) ===
          // 只有當修改「預計開始」或「預計完成」，且有有效完成日期時，才觸發後續連動
          if ((field === 'estStart' || field === 'estEnd') && currentStepDates.estEnd) {
            const allFlows = [
              WATER_FLOW.preReview, WATER_FLOW.installation, WATER_FLOW.tempToPerm,
              POWER_FLOW.preReview, POWER_FLOW.installation
            ];
            
            for (const flow of allFlows) {
              const stepIndex = flow.findIndex(s => s.id === step.id);
              // 找到所屬的流程，且不是最後一個項目
              if (stepIndex !== -1) {
                let previousEnd = currentStepDates.estEnd;
                
                // 往後更新該流程內所有後續項目的預計開始與完成時間
                for (let i = stepIndex + 1; i < flow.length; i++) {
                  const nextStep = flow[i];
                  const nextStepDates = { ...(newLotDates[nextStep.id] || {}) };
                  
                  // 設定下一個項目的預計開始日期為上一個項目的預計完成日期
                  nextStepDates.estStart = previousEnd;
                  
                  // 自動計算下一個項目的預計完成日期
                  const nextMaxDays = getMaxDays(nextStep.time);
                  if (nextMaxDays > 0) {
                    nextStepDates.estEnd = addWorkingDays(previousEnd, nextMaxDays);
                  } else {
                    nextStepDates.estEnd = previousEnd;
                  }
                  
                  newLotDates[nextStep.id] = nextStepDates;
                  previousEnd = nextStepDates.estEnd; // 更新指標供下一次迴圈使用
                }
                break; // 已找到並處理完所屬流程，跳出搜尋迴圈
              }
            }
          }

          return {
            ...prev,
            [activeLot]: newLotDates
          };
        });
      };

      // --- UI 子元件 ---
      const renderStepItem = (step, isLast) => {
        const isCompleted = activeLot ? (lotProgress[activeLot]?.[step.id] || false) : false;
        const dates = activeLot ? (lotDates[activeLot]?.[step.id] || {}) : {};
        
        // 判斷是否逾期：尚未填寫實際完成日期，且有預計完成日期，且今日已大於預計完成日期
        const todayStr = `${currentTime.getFullYear()}-${String(currentTime.getMonth() + 1).padStart(2, '0')}-${String(currentTime.getDate()).padStart(2, '0')}`;
        const targetEstEnd = dates.estEnd || dates.end;
        const isOverdue = !dates.actEnd && targetEstEnd && todayStr > targetEstEnd;
        
        const handleStepToggle = () => {
          if (!isEditMode || !activeLot) return;
          // 如果目前是未完成狀態，且沒有填寫實際完成日期，則阻擋勾選
          if (!isCompleted && !dates.actEnd) {
            showToast('請先填寫「實際完成日期」才可勾選完成！');
            return;
          }
          toggleItem(step.id);
        };

        return (
          <div key={step.id} className={`flex relative pb-8 ${isEditMode ? (!isCompleted && !dates.actEnd ? 'cursor-default' : 'cursor-pointer group') : 'cursor-default'}`} onClick={handleStepToggle}>
            {!isLast && (
              <div className={`absolute left-4 top-8 bottom-0 w-0.5 transition-colors duration-300 ${isCompleted ? 'bg-blue-600' : 'bg-gray-200'}`}></div>
            )}
            <div className="flex-shrink-0 z-10 mr-4">
              {isCompleted ? (
                <Icon name="CheckCircle2" className="w-8 h-8 text-blue-600 bg-white" />
              ) : (
                <Icon name="Circle" className={`w-8 h-8 text-gray-300 bg-white ${isEditMode ? (!dates.actEnd ? 'opacity-40' : 'group-hover:text-blue-400 transition-colors') : ''}`} />
              )}
            </div>
            <div className={`flex-grow bg-white p-4 rounded-lg border transition-all duration-300 shadow-sm ${isEditMode ? 'hover:shadow-md' : ''} ${isCompleted ? 'border-blue-300 border-l-4 border-l-blue-600' : (isOverdue ? 'border-red-300' : 'border-gray-200')}`}>
              <div className="flex justify-between items-start mb-1">
                <h4 className={`text-lg font-bold ${isCompleted ? 'text-gray-800' : (isOverdue ? 'text-red-700' : 'text-gray-600')}`}>{step.title}</h4>
                <span className={`text-xs font-medium px-2 py-1 rounded-full ${isOverdue ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600'}`}>{step.time}</span>
              </div>
              <p className="text-sm text-gray-500 mt-2 leading-relaxed">{step.desc}</p>
              
              {/* 日期區塊 */}
              <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3 border-t border-gray-100 pt-3" onClick={e => e.stopPropagation()}>
                {/* 預計開始 */}
                <div className="flex items-center space-x-2">
                  <Icon name="Calendar" className="w-4 h-4 text-gray-400 flex-shrink-0" />
                  <span className="text-sm text-gray-500 font-medium whitespace-nowrap">預計開始日期:</span>
                  {isEditMode ? (
                    <input
                      type="date"
                      value={dates.estStart || dates.start || ''} // 相容舊版資料的 start 屬性
                      onChange={(e) => handleDateChange(step, 'estStart', e.target.value)}
                      className="border border-gray-200 rounded px-2 py-1 text-sm text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-full transition-colors"
                    />
                  ) : (
                    <span className="text-sm text-gray-700">{dates.estStart || dates.start || '未設定'}</span>
                  )}
                </div>
                {/* 預計完成 */}
                <div className="flex items-center space-x-2">
                  <Icon name="Calendar" className="w-4 h-4 text-gray-400 flex-shrink-0" />
                  <span className="text-sm text-gray-500 font-medium whitespace-nowrap">預計完成日期:</span>
                  {isEditMode ? (
                    <input
                      type="date"
                      value={dates.estEnd || dates.end || ''} // 相容舊版資料的 end 屬性
                      onChange={(e) => handleDateChange(step, 'estEnd', e.target.value)}
                      className="border border-gray-200 rounded px-2 py-1 text-sm text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-full transition-colors"
                    />
                  ) : (
                    <span className="text-sm text-gray-700">{dates.estEnd || dates.end || '未設定'}</span>
                  )}
                </div>
                {/* 實際開始 */}
                <div className="flex items-center space-x-2">
                  <Icon name="Calendar" className="w-4 h-4 text-blue-400 flex-shrink-0" />
                  <span className="text-sm text-blue-600 font-medium whitespace-nowrap">實際開始日期:</span>
                  {isEditMode ? (
                    <input
                      type="date"
                      value={dates.actStart || ''}
                      onChange={(e) => handleDateChange(step, 'actStart', e.target.value)}
                      className="border border-blue-200 rounded px-2 py-1 text-sm text-gray-700 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-full transition-colors"
                    />
                  ) : (
                    <span className="text-sm text-gray-700">{dates.actStart || '未設定'}</span>
                  )}
                </div>
                {/* 實際完成 */}
                <div className="flex flex-col">
                  <div className="flex items-center space-x-2">
                    <Icon name="Calendar" className={`w-4 h-4 ${isOverdue ? 'text-red-500' : 'text-blue-400'} flex-shrink-0`} />
                    <span className={`text-sm ${isOverdue ? 'text-red-600 font-bold' : 'text-blue-600 font-medium'} whitespace-nowrap`}>實際完成日期:</span>
                    {isEditMode ? (
                      <input
                        type="date"
                        value={dates.actEnd || ''}
                        onChange={(e) => handleDateChange(step, 'actEnd', e.target.value)}
                        className={`border ${isOverdue ? 'border-red-400 bg-red-50 focus:border-red-500 focus:ring-red-500' : 'border-blue-200 focus:border-blue-500 focus:ring-blue-500'} rounded px-2 py-1 text-sm text-gray-700 focus:outline-none focus:ring-1 w-full transition-colors`}
                      />
                    ) : (
                      <span className={`text-sm ${isOverdue ? 'text-red-600 font-bold' : 'text-gray-700'}`}>{dates.actEnd || '未設定'}</span>
                    )}
                    {/* 逾期提醒圖示 */}
                    {isOverdue && (
                      <Icon name="AlertCircle" className="w-5 h-5 text-red-500 flex-shrink-0 animate-pulse" title="已逾期，請盡快填寫！" />
                    )}
                  </div>
                  {/* 未填寫日期時的防呆提示 */}
                  {isEditMode && !dates.actEnd && !isCompleted && !isOverdue && (
                    <span className="text-xs text-gray-400 mt-1 ml-6">* 需先填寫才能勾選完成</span>
                  )}
                  {/* 逾期文字強烈提醒 */}
                  {isOverdue && (
                    <span className="text-xs text-red-600 font-bold mt-1 ml-6">⚠️ 已超過預計完成日期，請盡速更新！</span>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      };

      const renderProgressHeader = (title, flow) => (
        <div className="flex items-center justify-between mb-6 bg-slate-50 p-4 rounded-lg border border-slate-200">
          <h3 className="text-xl font-bold text-slate-800">{title}</h3>
          <div className="flex items-center space-x-3">
            <span className="text-sm text-slate-500">進度</span>
            <div className="w-32 h-3 bg-gray-200 rounded-full overflow-hidden">
              <div 
                className="h-full bg-blue-600 transition-all duration-500"
                style={{ width: `${calculateProgress(flow)}%` }}
              ></div>
            </div>
            <span className="text-sm font-bold text-blue-700">{calculateProgress(flow)}%</span>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-100 font-sans pb-12 relative">
          
          {/* Toast 提示框 */}
          {toastMessage && (
            <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl z-[200] flex items-center transition-all animate-fade-in-down">
              <Icon name="CheckCircle2" className="w-5 h-5 mr-2 text-green-400" />
              {toastMessage}
            </div>
          )}

          {/* 頂部導航 */}
          <header className="bg-white shadow-sm sticky top-0 z-50">
            <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
              <div className="flex items-center space-x-3">
                <Icon name="Building2" className="w-8 h-8 text-blue-700" />
                <div>
                  <h1 className="text-xl font-black text-gray-800 tracking-wider hidden sm:block">聯悦建設</h1>
                  <p className="text-xs text-gray-500 font-bold uppercase tracking-widest hidden sm:block">公單位申請系統</p>
                </div>
              </div>
              
              <div className="flex items-center space-x-2">
                
                {/* 新增：今日日期及時間 */}
                <div className="hidden md:flex items-center text-sm font-medium text-gray-600 mr-2 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-100">
                  <Icon name="Calendar" className="w-4 h-4 mr-2 text-gray-400" />
                  {currentTime.getFullYear()}/{String(currentTime.getMonth() + 1).padStart(2, '0')}/{String(currentTime.getDate()).padStart(2, '0')} {String(currentTime.getHours()).padStart(2, '0')}:{String(currentTime.getMinutes()).padStart(2, '0')}:{String(currentTime.getSeconds()).padStart(2, '0')}
                </div>

                {/* 編輯模式下的額外按鈕 (儲存與導出) */}
                {isEditMode && (
                  <div className="flex items-center space-x-2 mr-2">
                    <button 
                      onClick={handleSaveData} 
                      className="flex items-center space-x-1 px-3 py-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 border border-emerald-200 rounded-md transition-colors text-sm font-medium"
                      title="將資料暫存至瀏覽器"
                    >
                      <Icon name="Save" className="w-4 h-4" />
                      <span className="hidden md:inline">儲存數據(暫存)</span>
                    </button>
                    <button 
                      onClick={() => window.print()} 
                      className="flex items-center space-x-1 px-3 py-2 bg-cyan-50 text-cyan-600 hover:bg-cyan-100 border border-cyan-200 rounded-md transition-colors text-sm font-medium"
                      title="列印或另存為PDF檔"
                    >
                      <Icon name="Printer" className="w-4 h-4" />
                      <span className="hidden md:inline">列印/另存PDF檔</span>
                    </button>
                    <button 
                      onClick={handleExportFile} 
                      className="flex items-center space-x-1 px-3 py-2 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200 rounded-md transition-colors text-sm font-medium"
                      title="下載進度備份檔案"
                    >
                      <Icon name="Download" className="w-4 h-4" />
                      <span className="hidden md:inline">導出檔案</span>
                    </button>
                  </div>
                )}

                <button
                  onClick={() => isEditMode ? setIsEditMode(false) : setShowAuthModal(true)}
                  className={`flex items-center space-x-2 px-4 py-2 rounded-md transition-colors font-medium text-sm ${
                    isEditMode
                      ? 'bg-red-50 text-red-600 hover:bg-red-100 border border-red-200'
                      : 'bg-blue-50 text-blue-600 hover:bg-blue-100 border border-blue-200'
                  }`}
                >
                  {isEditMode ? (
                    <><Icon name="LockOpen" className="w-4 h-4" /><span className="hidden sm:inline">鎖定編輯模式</span></>
                  ) : (
                    <><Icon name="Lock" className="w-4 h-4" /><span className="hidden sm:inline">解鎖編輯模式</span></>
                  )}
                </button>
              </div>
            </div>
          </header>

          {/* 專案地號區塊 */}
          <div className="max-w-6xl mx-auto px-4 pt-8">
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col md:flex-row md:items-center gap-4">
              <div className="flex items-center text-gray-700 font-bold min-w-max">
                <Icon name="MapPin" className="w-5 h-5 text-blue-600 mr-2" />
                <span>專案地號：</span>
              </div>

              <div className="flex-grow flex flex-wrap items-center gap-2">
                {lotNumbers.length === 0 && !isEditMode && (
                  <span className="text-gray-400 text-sm">尚未設定地號</span>
                )}
                
                {/* 顯示所有地號標籤，可點擊切換與編輯 */}
                {lotNumbers.map((lot, idx) => {
                  if (editingLotIndex === idx) {
                    return (
                      <span key={idx} className="flex items-center px-2 py-1 rounded-lg border bg-blue-50 border-blue-400 shadow-inner">
                        <input
                          autoFocus
                          type="text"
                          value={editingLotValue}
                          onChange={(e) => setEditingLotValue(e.target.value)}
                          onBlur={() => saveEditedLot(idx)}
                          onKeyDown={(e) => {
                            if (e.key === 'Enter') saveEditedLot(idx);
                            if (e.key === 'Escape') setEditingLotIndex(null);
                          }}
                          className="w-32 bg-white border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                      </span>
                    );
                  }

                  return (
                    <span 
                      key={idx} 
                      onClick={() => setActiveLot(lot)}
                      onDoubleClick={(e) => { if (isEditMode) startEditingLot(e, idx, lot); }}
                      className={`flex items-center px-4 py-2 rounded-lg text-sm font-bold border cursor-pointer transition-all ${
                        activeLot === lot
                          ? 'bg-blue-600 text-white border-blue-600 shadow-md'
                          : 'bg-white text-gray-600 border-gray-300 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300'
                      }`}
                    >
                      <span>{lot}</span>
                      {isEditMode && (
                        <div className="flex items-center ml-2 -mr-1">
                          <button 
                            onClick={(e) => startEditingLot(e, idx, lot)} 
                            className={`mr-1 transition-colors focus:outline-none ${
                              activeLot === lot ? 'text-blue-200 hover:text-white' : 'text-gray-400 hover:text-blue-500'
                            }`}
                            title="編輯名稱"
                          >
                            <Icon name="Pencil" className="w-3.5 h-3.5" />
                          </button>
                          <button 
                            onClick={(e) => handleRemoveLot(e, idx)} 
                            className={`transition-colors focus:outline-none ${
                              activeLot === lot ? 'text-blue-200 hover:text-white' : 'text-gray-400 hover:text-red-500'
                            }`}
                            title="移除地號"
                          >
                            <Icon name="X" className="w-4 h-4" />
                          </button>
                        </div>
                      )}
                    </span>
                  );
                })}
              </div>

              {isEditMode && (
                <div className="flex items-center space-x-2 md:ml-auto w-full md:w-auto">
                  <input
                    type="text"
                    value={newLotInput}
                    onChange={(e) => setNewLotInput(e.target.value)}
                    onKeyDown={(e) => { if (e.key === 'Enter') handleAddLot(); }}
                    placeholder="輸入地號 (例: 001-002)"
                    className="flex-grow md:flex-grow-0 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  />
                  <button
                    onClick={handleAddLot}
                    className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors whitespace-nowrap shadow-sm"
                  >
                    新增
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* 主要內容區塊：若無選擇地號則隱藏或顯示提示 */}
          {!activeLot ? (
             <div className="max-w-6xl mx-auto px-4 py-12">
               <div className="bg-white rounded-xl border border-dashed border-gray-300 p-12 flex flex-col items-center justify-center text-gray-500">
                 <Icon name="MapPin" className="w-12 h-12 mb-4 text-gray-300" />
                 <h3 className="text-lg font-bold text-gray-700 mb-2">尚未選擇專案地號</h3>
                 <p className="text-sm">請先在上方{isEditMode ? '新增' : '解鎖並新增'}一個專案地號，即可開始追蹤申請進度。</p>
               </div>
             </div>
          ) : (
            <main className="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
              {/* 左側選單 */}
              <aside className="w-full md:w-64 flex-shrink-0">
                <nav className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden sticky top-24">
                  <button onClick={() => setActiveTab('documents')} className={`w-full flex items-center space-x-3 px-5 py-4 text-left transition-colors ${activeTab === 'documents' ? 'bg-blue-50 border-l-4 border-blue-600 text-blue-700 font-bold' : 'text-gray-600 hover:bg-gray-50 border-l-4 border-transparent'}`}>
                    <Icon name="FileText" className="w-5 h-5" /><span>所需相關文件</span>
                  </button>
                  <button onClick={() => setActiveTab('water')} className={`w-full flex items-center space-x-3 px-5 py-4 text-left transition-colors border-t border-gray-100 ${activeTab === 'water' ? 'bg-blue-50 border-l-4 border-blue-600 text-blue-700 font-bold' : 'text-gray-600 hover:bg-gray-50 border-l-4 border-transparent'}`}>
                    <Icon name="Droplets" className="w-5 h-5" /><span>用水設備申請</span>
                  </button>
                  <button onClick={() => setActiveTab('power')} className={`w-full flex items-center space-x-3 px-5 py-4 text-left transition-colors border-t border-gray-100 ${activeTab === 'power' ? 'bg-blue-50 border-l-4 border-blue-600 text-blue-700 font-bold' : 'text-gray-600 hover:bg-gray-50 border-l-4 border-transparent'}`}>
                    <Icon name="Zap" className="w-5 h-5" /><span>用電設備申請</span>
                  </button>
                  <button onClick={() => setActiveTab('overview')} className={`w-full flex items-center space-x-3 px-5 py-4 text-left transition-colors border-t border-gray-100 ${activeTab === 'overview' ? 'bg-blue-50 border-l-4 border-blue-600 text-blue-700 font-bold' : 'text-gray-600 hover:bg-gray-50 border-l-4 border-transparent'}`}>
                    <Icon name="AlertCircle" className="w-5 h-5" /><span>使照前後五大管線</span>
                  </button>
                </nav>
              </aside>

              {/* 右側內容區 */}
              <section className="flex-grow">
                {/* 文件視圖 */}
                {activeTab === 'documents' && (
                  <div className="space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                        <Icon name="FileText" className="mr-2 w-6 h-6 text-blue-600" /> 所需相關文件檢核表
                        <span className="ml-3 text-sm font-medium bg-blue-100 text-blue-700 px-3 py-1 rounded-full">{activeLot}</span>
                      </h2>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {DOCUMENT_REQUIREMENTS.map((category) => (
                          <div key={category.id} className="bg-gray-50 p-5 rounded-lg border border-gray-200">
                            <h3 className="font-bold text-lg text-gray-800 mb-4 border-b pb-2">{category.title}</h3>
                            <ul className="space-y-3">
                              {category.items.map((item, idx) => {
                                const itemId = `${category.id}-${idx}`;
                                // 判斷此地號的該項目是否已勾選
                                const isChecked = lotProgress[activeLot]?.[itemId] || false;
                                return (
                                  <li key={itemId} className={`flex items-center space-x-3 ${isEditMode ? 'cursor-pointer group' : 'cursor-default'}`} onClick={() => toggleItem(itemId)}>
                                    {isChecked ? (
                                      <Icon name="CheckCircle2" className="w-5 h-5 text-green-500 flex-shrink-0" />
                                    ) : (
                                      <Icon name="Circle" className={`w-5 h-5 text-gray-400 flex-shrink-0 ${isEditMode ? 'group-hover:text-blue-400' : ''}`} />
                                    )}
                                    <span className={`${isChecked ? 'text-gray-800 line-through opacity-70' : 'text-gray-700'}`}>{item}</span>
                                  </li>
                                )
                              })}
                            </ul>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* 自來水視圖 */}
                {activeTab === 'water' && (
                  <div className="space-y-8">
                    <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 flex items-start space-x-3">
                      <Icon name="Info" className="text-blue-600 w-6 h-6 flex-shrink-0 mt-0.5" />
                      <div>
                        <h4 className="font-bold text-blue-800">費用說明</h4>
                        <p className="text-sm text-blue-700 mt-1">預審費用含在機電公司規劃費用內(設計費用約50~80/坪)。圖面抽換需機電機師用印抽換送審。</p>
                      </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      {renderProgressHeader("1. 預審用水設備內線圖", WATER_FLOW.preReview)}
                      <div className="ml-2">
                        {WATER_FLOW.preReview.map((step, idx) => renderStepItem(step, idx === WATER_FLOW.preReview.length - 1))}
                      </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      {renderProgressHeader("2. 新裝用水設備流程", WATER_FLOW.installation)}
                      <div className="ml-2">
                        {WATER_FLOW.installation.map((step, idx) => renderStepItem(step, idx === WATER_FLOW.installation.length - 1))}
                      </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      {renderProgressHeader("3. 臨時水轉正式水建議流程", WATER_FLOW.tempToPerm)}
                      <div className="ml-2">
                        {WATER_FLOW.tempToPerm.map((step, idx) => renderStepItem(step, idx === WATER_FLOW.tempToPerm.length - 1))}
                      </div>
                    </div>
                  </div>
                )}

                {/* 台電視圖 */}
                {activeTab === 'power' && (
                  <div className="space-y-8">
                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 flex items-start space-x-3">
                      <Icon name="AlertCircle" className="text-amber-600 w-6 h-6 flex-shrink-0 mt-0.5" />
                      <div>
                        <h4 className="font-bold text-amber-800">重要提醒：聯合開挖時機點</h4>
                        <p className="text-sm text-amber-700 mt-1">申請聯合挖路許可前，務必確認以下項目已完成：<br/>1. 台電變電所地坪完成。 2. 電力水孔完成。 3. 電錶箱體安裝完成。 4. 拆架完成 (拆架前一個月掛件)。</p>
                      </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      {renderProgressHeader("1. 預審用電設備內線圖", POWER_FLOW.preReview)}
                      <div className="ml-2">
                        {POWER_FLOW.preReview.map((step, idx) => renderStepItem(step, idx === POWER_FLOW.preReview.length - 1))}
                      </div>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      <div className="mb-4 text-sm text-gray-500 italic">*註：以下工作天數以台電內部正常流程時間為準，不包含台電外包廠商突發狀況延期因素。</div>
                      {renderProgressHeader("2. 新裝用電設備流程", POWER_FLOW.installation)}
                      <div className="ml-2">
                        {POWER_FLOW.installation.map((step, idx) => renderStepItem(step, idx === POWER_FLOW.installation.length - 1))}
                      </div>
                    </div>
                  </div>
                )}

                {/* 五大管線視圖 */}
                {activeTab === 'overview' && (
                  <div className="space-y-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                      <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">機電使照前後辦理事項：五大管線</h2>
                      <div className="space-y-4">
                        {FIVE_PIPELINES.map((pipe, idx) => (
                          <div key={idx} className="flex flex-col md:flex-row md:items-center bg-gray-50 p-4 rounded-lg border border-gray-200 hover:shadow-md transition-shadow">
                            <div className="md:w-32 flex-shrink-0 mb-2 md:mb-0">
                              <span className="inline-block px-3 py-1 bg-slate-700 text-white rounded font-bold text-sm">
                                {pipe.name}
                              </span>
                            </div>
                            <div className="flex-grow text-gray-700 font-medium">
                              {pipe.flow.split('→').map((part, i, arr) => (
                                <span key={i}>
                                  {part.trim()}
                                  {i < arr.length - 1 && <span className="mx-2 text-blue-500">➜</span>}
                                </span>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </section>
            </main>
          )}

          {/* 解鎖密碼彈出視窗 (Modal) */}
          {showAuthModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] px-4">
              <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm border border-gray-100">
                <div className="flex items-center mb-4">
                  <div className="bg-blue-100 p-2 rounded-full mr-3">
                    <Icon name="Lock" className="w-6 h-6 text-blue-600" />
                  </div>
                  <h3 className="text-xl font-bold text-gray-800">解鎖編輯模式</h3>
                </div>
                
                <p className="text-sm text-gray-500 mb-4">請輸入密碼以變更文件檢核與專案進度。</p>
                
                <input
                  type="password"
                  className={`w-full border p-3 rounded-lg mb-2 focus:outline-none focus:ring-2 ${authError ? 'border-red-300 focus:ring-red-200' : 'border-gray-200 focus:border-blue-500 focus:ring-blue-200'} transition-all`}
                  placeholder="請輸入密碼"
                  value={passwordInput}
                  onChange={(e) => setPasswordInput(e.target.value)}
                  onKeyDown={(e) => { if (e.key === 'Enter') handleVerifyPassword(); }}
                  autoFocus
                />
                
                {authError && <p className="text-red-500 text-sm mb-2">{authError}</p>}
                
                <div className="flex justify-end gap-3 mt-6">
                  <button 
                    onClick={() => { setShowAuthModal(false); setAuthError(''); setPasswordInput(''); }} 
                    className="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors font-medium"
                  >
                    取消
                  </button>
                  <button 
                    onClick={handleVerifyPassword} 
                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium shadow-sm"
                  >
                    確認解鎖
                  </button>
                </div>
              </div>
            </div>
          )}
          
          <style dangerouslySetInnerHTML={{__html: `
            @keyframes fadeInDown {
              from { opacity: 0; transform: translate(-50%, -20px); }
              to { opacity: 1; transform: translate(-50%, 0); }
            }
            .animate-fade-in-down {
              animation: fadeInDown 0.3s ease-out forwards;
            }
          `}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body></html>
